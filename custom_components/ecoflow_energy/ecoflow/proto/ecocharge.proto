  uint32 ems_mppt_selfcheck_state = 50;
  uint32 ems_mppt_startup_state = 51;
  uint32 ems_bp_selfcheck_state = 52;
  uint32 ems_bp_startup_state = 53;
  uint32 ems_pcs_selfcheck_state = 54;
  uint32 ems_pcs_startup_state = 55;
  float ems_bus_volt = 56;
  uint32 ems_active_off_grid_cmd = 57;
  uint32 ems_bp_alive_num = 58;
  float ems_bp_power = 59;
