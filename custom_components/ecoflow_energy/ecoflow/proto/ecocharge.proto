syntax = "proto3";

// ecocharge — Canonical Protobuf schema for EcoFlow PowerOcean telemetry.
// Envelope (HeaderMessage/Header) + JT-S1 PowerOcean messages in one file.
// Source: Protocol analysis of EcoFlow Portal web client, validated against live MQTT.

package ecoflow;

// --- Envelope ---

message Header {
  bytes pdata = 1;
  uint32 src = 2;
  uint32 dest = 3;
  uint32 d_src = 4;
  uint32 d_dest = 5;
  uint32 check_type = 7;
  uint32 cmd_func = 8;
  uint32 cmd_id = 9;
  uint32 data_len = 10;
  uint32 seq = 14;
  uint32 product_id = 15;
  uint32 payload_ver = 16;
  string device_sn = 24;
}

message HeaderMessage {
  repeated Header header = 1;
}

// --- Sub-messages ---

message JTS1PhaseInfo {
  float vol = 1;
  float amp = 2;
  float act_pwr = 3;
  float react_pwr = 4;
  float apparent_pwr = 5;
}

message JTS1MpptPVInfo {
  float vol = 1;
  float amp = 2;
  float pwr = 3;
  bool light_sta = 4;
}

message JTS1MpptStaReport {
  repeated JTS1MpptPVInfo mppt_pv = 1;
  float mppt_ins_resist = 2;
  repeated float mppt_temp_val = 3;
}

message JTS1MeterStaReport {
  uint32 meter_type = 1;
  uint32 meter_addr = 2;
  repeated float meter_data = 3;
}

message JTS1LoadInfo {
  float vol = 1;
  float amp = 2;
  float freq = 3;
  float pwr = 4;
}

// --- Energy Stream Report (cmd_func=96, cmd_id=33) ---
message JTS1EnergyStreamReport {
  float sys_load_pwr = 1;
  float sys_grid_pwr = 2;
  float mppt_pwr = 3;
  float bp_pwr = 4;
  uint32 bp_soc = 5;
}

// --- PV Inverter Energy Stream Report (cmd_func=96, cmd_id=39) ---
message JTS1EmsPVInvEnergyStreamReport {
  float pv_inv_pwr = 1;
}

// --- Energy Stream Detail (cmd_func=96, cmd_id=34) ---
message JTS1EnergyStreamItem {
  float load_pwr = 1;
  float grid_pwr = 2;
  float mppt_pwr = 3;
  float bp_pwr = 4;
  uint32 timestamp = 5;
  sint32 timezone = 6;
  uint32 bp_soc = 7;
}

message JTS1EnergyStreamDetail {
  repeated JTS1EnergyStreamItem sys_energy_stream = 1;
  uint32 sys_seq = 2;
}

