  float bp_real_soc = 38;
  float bp_real_soh = 39;
  uint32 bp_global_protect = 40;
  uint32 bp_down_limit_soc = 41;
  uint32 bp_up_limit_soc = 42;
  uint32 bp_active_cal_req_stat = 43;
  uint32 bp_active_cal_run_stat = 44;
  uint32 module_product_info = 45;
  uint32 module_program_sta = 46;
  uint32 module_apl_sw_ver = 47;
  uint32 module_loader_sw_ver = 48;
  uint32 bms_run_sta = 49;
  uint32 bms_chg_dsg_sta = 50;
  uint32 dab_mod_sta = 51;
  uint32 bp_chg_sop = 52;
  uint32 bp_dsg_sop = 53;
  float bp_remain_watth = 54;
  float bp_target_soc = 55;
