  float pcs_bus_volt = 16;
  float pcs_leak_amp = 17;
  float pcs_dci = 18;
  float pcs_dcv = 19;
  repeated JTS1MeterStaReport meter_heart_beat = 30;
  repeated JTS1MpptStaReport mppt_heart_beat = 31;
  float pcs_vbus_ref = 32;
  float pcs_active_power_ref = 33;
