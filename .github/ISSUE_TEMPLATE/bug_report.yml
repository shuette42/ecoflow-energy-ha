name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below so we can investigate and fix it.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      placeholder: "e.g. 2025.3.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      placeholder: "e.g. 1.5.0"
    validations:
      required: true

  - type: dropdown
    id: device_type
    attributes:
      label: Device Type
      options:
        - PowerOcean
        - Delta 2 Max
        - Smart Plug
        - Other / Multiple
    validations:
      required: true

  - type: dropdown
    id: connection_mode
    attributes:
      label: Connection Mode
      options:
        - Standard (HTTP Polling)
        - Enhanced (MQTT Protobuf)
        - Both
        - Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: |
        Describe the bug clearly. Include:
        - What you were doing when the issue occurred
        - What you expected to happen
        - What actually happened
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Entries
      description: Copy log entries from Home Assistant (Settings > System > Logs). Enable debug logging if possible.
      render: text
    validations:
      required: false

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: If possible, download the integration diagnostics (Settings > Integrations > EcoFlow Energy > 3 dots > Download Diagnostics) and paste or attach the JSON.
      render: json
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might help (screenshots, firmware version, network setup, etc.)
    validations:
      required: false
