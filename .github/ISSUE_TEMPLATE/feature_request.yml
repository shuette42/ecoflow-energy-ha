name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement! Please describe your idea below.

  - type: dropdown
    id: device_type
    attributes:
      label: Device Type
      description: Which device is this feature for?
      options:
        - PowerOcean
        - Delta 2 Max
        - Smart Plug
        - All Devices
        - New Device Support
        - Not device-specific
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this feature solve? What are you trying to achieve?
      placeholder: "I want to ... because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or alternative approaches?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else (screenshots, API documentation links, related issues, etc.)
    validations:
      required: false
